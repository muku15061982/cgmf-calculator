<h2>CGMF Investment Calculator</h2>

<label>Monthly SIP (₹)</label>
<input type="number" id="sip" value="500"><br><br>

<label>Lump Sum Investment (₹)</label>
<input type="number" id="lump" value="10000"><br><br>

<label>Years</label>
<input type="number" id="years" value="20"><br><br>

<label>Expected Return (%)</label>
<input type="number" id="rate" value="12"><br><br>

<button onclick="calc()">Calculate</button>

<h3 id="result"></h3>

<script>
function calc() {
 let sip = parseFloat(document.getElementById("sip").value);
 let lump = parseFloat(document.getElementById("lump").value);
 let years = parseFloat(document.getElementById("years").value);
 let rate = parseFloat(document.getElementById("rate").value);

 let r = rate / 100 / 12;
 let n = years * 12;

 let sipValue = sip * (((Math.pow(1+r,n)-1)/r)*(1+r));
 let lumpValue = lump * Math.pow(1 + rate/100, years);

 let totalInvestment = (sip * n) + lump;
 let totalValue = sipValue + lumpValue;
 let wealthGain = totalValue - totalInvestment;

 document.getElementById("result").innerHTML =
 "Total Investment: ₹" + Math.round(totalInvestment).toLocaleString() +
 "<br>Total Value: ₹" + Math.round(totalValue).toLocaleString() +
 "<br>Wealth Gain: ₹" + Math.round(wealthGain).toLocaleString();
}
</script>
