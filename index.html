<!DOCTYPE html>
<html>
<head>
<title>CGMF SIP Calculator</title>
<style>
body{
font-family:Arial;
max-width:500px;
margin:auto;
padding:20px;
}
input{
width:100%;
padding:10px;
margin:10px 0;
}
button{
padding:10px 20px;
background:#6a1b9a;
color:white;
border:none;
}
#result{
font-size:22px;
font-weight:bold;
margin-top:20px;
}
</style>
</head>
<body>

<h2>CGMF SIP Calculator</h2>

<label>Monthly SIP (₹)</label>
<input type="number" id="sip" value="500">

<label>Years</label>
<input type="number" id="years" value="20">

<label>Expected Return (%)</label>
<input type="number" id="rate" value="12">

<button onclick="calc()">Calculate</button>

<div id="result"></div>

<script>
function calc(){
let P=document.getElementById("sip").value;
let Y=document.getElementById("years").value;
let R=document.getElementById("rate").value/100/12;

let N=Y*12;
let FV=P*((Math.pow(1+R,N)-1)/R)*(1+R);

document.getElementById("result").innerHTML=
"Estimated Value: ₹"+Math.round(FV).toLocaleString();
}
</script>

</body>
</html>
